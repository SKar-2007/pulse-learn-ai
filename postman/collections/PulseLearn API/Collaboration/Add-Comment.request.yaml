$kind: http-request
name: Add Comment
method: POST
url: '{{baseUrl}}/api/collab/comment'
order: 4000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "node_id": "{{nodeId}}",
      "content": "This node is well explained. I had some questions about backpropagation."
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is valid", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 400, 403, 404, 500]);
      });
      if (pm.response.code === 200) {
        pm.test("Comment returned", () => {
          const json = pm.response.json();
          pm.expect(json).to.have.property("comment");
        });
      }

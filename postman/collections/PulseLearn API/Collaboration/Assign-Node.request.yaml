$kind: http-request
name: Assign Node
method: PATCH
url: '{{baseUrl}}/api/collab/node/assign'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "node_id": "{{nodeId}}",
      "assigned_to": "user-uuid-placeholder"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status is valid", () => {
        pm.expect(pm.response.code).to.be.oneOf([200, 400, 403, 404, 500]);
      });
      if (pm.response.code === 200) {
        pm.test("Success returned", () => {
          const json = pm.response.json();
          pm.expect(json.success).to.be.true;
        });
      }
